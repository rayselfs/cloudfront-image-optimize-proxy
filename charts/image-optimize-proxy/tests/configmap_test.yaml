suite: Test ConfigMap Rendering Success
templates:
  - configmap.yaml
tests:
  - it: should succeed and render correct config when required fields are provided
    set:
      config.cacheS3Bucket: "test-cache-bucket"
      config.allowedUpstreamGateways: "api.example.com,images.example.com"
      config.allowedSourceBuckets: "my-source-bucket-1,my-source-bucket-2"
    asserts:
      - equal:
          path: data.CACHE_S3_BUCKET
          value: "test-cache-bucket"
      - equal:
          path: data.ALLOWED_UPSTREAM_GATEWAYS
          value: "api.example.com,images.example.com"
      - equal:
          path: data.ALLOWED_SOURCE_BUCKETS
          value: "my-source-bucket-1,my-source-bucket-2"
      - equal:
          path: data.DEFAULT_QUALITY
          value: "75"
