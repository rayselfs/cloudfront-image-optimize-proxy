{{- if .Values.prometheusRule.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "image-optimize-proxy.fullname" . }}
  namespace: {{ .Values.prometheusRule.namespace | default .Release.Namespace }}
  labels:
    {{- include "image-optimize-proxy.labels" . | nindent 4 }}
    {{- with .Values.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: image-optimize-proxy
      interval: 30s
      rules:
        - alert: ImageProxyHigh5xxRate
          expr: rate(http_request_duration_seconds_count{status_class="5xx"}[5m]) / rate(http_request_duration_seconds_count[5m]) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High 5xx error rate on image-optimize-proxy"
            description: "5xx error rate is {{ "{{ $value | humanizePercentage }}" }} (threshold: 5%)"

        - alert: ImageProxyImgproxyErrorRate
          expr: rate(imgproxy_errors_total[5m]) > 0.01
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High imgproxy error rate"
            description: "imgproxy error rate is {{ "{{ $value | humanizePercentage }}" }} (threshold: 1%)"

        - alert: ImageProxyCachePutFailures
          expr: rate(cache_put_errors_total[5m]) + rate(async_cache_put_dropped_total[5m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Cache put failures detected"
            description: "Cache put failure rate is {{ "{{ $value | humanize }}" }}/sec"

        - alert: ImageProxyHighMissRatio
          expr: rate(cache_misses_total[5m]) / (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m]) + 1) > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High cache miss ratio"
            description: "Cache miss ratio is {{ "{{ $value | humanizePercentage }}" }} (threshold: 80%)"

        - alert: ImageProxyHighP95Latency
          expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2.0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High P95 request latency"
            description: "P95 latency is {{ "{{ $value | humanizeDuration }}" }} (threshold: 2s)"
{{- end }}
