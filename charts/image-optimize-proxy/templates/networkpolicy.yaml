{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "image-optimize-proxy.fullname" . }}
  labels:
    {{- include "image-optimize-proxy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "image-optimize-proxy.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
      {{- if .Values.networkPolicy.ingressFromCIDRs }}
      from:
        {{- range .Values.networkPolicy.ingressFromCIDRs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      {{- end }}
  egress:
    # Allow traffic to imgproxy sidecar on localhost (same pod)
    - ports:
        - protocol: TCP
          port: 8081
    {{- if .Values.networkPolicy.egressToS3 }}
    # Allow HTTPS to S3 endpoints
    - ports:
        - protocol: TCP
          port: 443
    {{- end }}
    {{- if .Values.networkPolicy.egressToDNS }}
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
{{- end }}
