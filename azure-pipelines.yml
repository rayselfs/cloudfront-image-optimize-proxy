trigger:
  branches:
    include:
      - main
      - feat/image-optimize-proxy
  paths:
    include:
      - packages/image-optimize-proxy/**

pool:
  name: "Default"

variables:
  GO_VERSION: "1.25"
  WORKING_DIR: "packages/image-optimize-proxy"
  REPOSITORY: ops/image-optimize-proxy

resources:
  repositories:
    - repository: ops-pipelines
      type: git
      name: OPS/ops-pipelines

stages:
  - stage: CI
    displayName: "Build & Test"
    jobs:
      - job: Test
        displayName: "Go Build & Test"
        steps:
          - task: GoTool@0
            displayName: "Install Go $(GO_VERSION)"
            inputs:
              version: "$(GO_VERSION)"

          - script: |
              go vet ./...
            displayName: "Go Vet"
            workingDirectory: $(WORKING_DIR)

          - script: |
              go test ./... -v -cover -coverprofile=coverage.out
            displayName: "Go Test"
            workingDirectory: $(WORKING_DIR)

      - job: Build
        displayName: "Build Image"
        dependsOn: Test
        condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
        steps:
          - script: |
              IMAGE_TAG="$(git rev-parse --short HEAD)"
              echo "##vso[task.setvariable variable=IMAGE_TAG]$IMAGE_TAG"
            displayName: "Set image tag"
          - template: templates/docker-build-v2.yaml@ops-pipelines
            parameters:
              dockerfile: packages/image-optimize-proxy/Dockerfile
              build_context: packages/image-optimize-proxy
              repository: $(REPOSITORY)
              image_tag: $(IMAGE_TAG)
              multi_platform: true
